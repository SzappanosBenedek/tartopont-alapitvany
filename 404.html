<!DOCTYPE html>
<html lang="hu">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Az oldal nem található - TartóPont Alapítvány</title>
    <meta name="robots" content="noindex, follow">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .error-page {
            min-height: 60vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 2rem;
        }

        .error-code {
            font-size: 6rem;
            font-weight: 700;
            color: var(--color-primary-blue);
            line-height: 1;
            margin-bottom: 1rem;
        }
    </style>
</head>

<body>
    <header class="header">
        <div class="container">
            <nav class="navbar">
                <a href="/" class="logo">
                    <img src="assets/images/logo.png" alt="TartóPont Alapítvány" style="height: 60px; width: auto;">
                    <span class="logo-text">TartóPont Alapítvány</span>
                </a>
                <a href="/" class="btn btn-outline mobile-hide">Vissza a főoldalra</a>
            </nav>
        </div>
    </header>

    <section class="error-page">
        <div class="error-code">404</div>
        <h1>Az oldal nem található</h1>
        <p class="text-large" style="max-width: 600px; margin-bottom: 2rem;">
            Sajnáljuk, de a keresett oldal nem létezik vagy elköltözött.
            Lehet, hogy elgépelte a címet, vagy egy hibás linkre kattintott.
        </p>
        <div class="btn-group">
            <a href="/" class="btn btn-primary">Vissza a főoldalra</a>
            <a href="/kapcsolat" class="btn btn-outline">Kapcsolatfelvétel</a>
        </div>
    </section>

    <footer class="footer">
        <div class="container">
            <div class="footer-bottom">
                <p>&copy; 2026 TartóPont Alapítvány. Minden jog fenntartva.</p>
            </div>
        </div>
    </footer>
</body>

</html>
